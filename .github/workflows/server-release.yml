name: Server Release

# Server-only 独立发布工作流
# 只构建 Next.js server bundle，不编译 Rust/Tauri
# 适用于仅修改了 server 端代码的快速发布

on:
  push:
    tags:
      - 'server-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Job 1: 构建 server bundle 并生成 delta
  build-and-delta:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史和所有 tag，用于查找旧版本

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # 从 tag 名中提取版本号（server-v0.2.8 -> 0.2.8）
      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#server-v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Server version: ${VERSION}"

      # 更新 package.json 版本号以匹配 tag
      - name: Update package.json version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          jq --arg v "$VERSION" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json
          echo "Updated package.json version to ${VERSION}"

          # 同步更新 src-tauri/server/package.json
          if [ -f "src-tauri/server/package.json" ]; then
            jq --arg v "$VERSION" '.version = $v' src-tauri/server/package.json > src-tauri/server/package.json.tmp
            mv src-tauri/server/package.json.tmp src-tauri/server/package.json
            echo "Updated src-tauri/server/package.json to version ${VERSION}"
          fi

      # 构建 Next.js standalone 产物
      - name: Build Next.js
        run: npm run build

      # 使用 standalone-utils.js 的逻辑组装 server bundle
      - name: Assemble server bundle
        run: |
          node -e '
            const path = require("path");
            const fs = require("fs");
            const { assembleServerBundle, printBundleSize } = require("./scripts/standalone-utils");

            const ROOT = process.cwd();
            const STANDALONE_DIR = path.join(ROOT, ".next", "standalone");

            if (!fs.existsSync(STANDALONE_DIR)) {
              console.error("ERROR: .next/standalone not found");
              process.exit(1);
            }

            function findFile(dir, filename, maxDepth) {
              if (maxDepth === undefined) maxDepth = 10;
              if (maxDepth <= 0 || !fs.existsSync(dir)) return null;
              try {
                for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
                  if (entry.isDirectory()) {
                    if (entry.name === "node_modules") continue;
                    const result = findFile(path.join(dir, entry.name), filename, maxDepth - 1);
                    if (result) return result;
                  } else if (entry.name === filename) {
                    return path.join(dir, entry.name);
                  }
                }
              } catch(e) {}
              return null;
            }

            const serverJs = findFile(STANDALONE_DIR, "server.js");
            if (!serverJs) {
              console.error("ERROR: server.js not found in standalone output");
              process.exit(1);
            }

            const standaloneRoot = path.dirname(serverJs);
            console.log("Standalone root:", standaloneRoot);

            const destDir = path.join(ROOT, "dist", "vacdevice-server");
            assembleServerBundle(standaloneRoot, destDir);
            printBundleSize(destDir);
          '

      # 打包为 tar.gz
      - name: Package server bundle
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SERVER_TAR_NAME="server-${VERSION}.tar.gz"

          tar czf "dist/${SERVER_TAR_NAME}" -C dist/vacdevice-server .

          # 验证 gzip 完整性
          gzip -t "dist/${SERVER_TAR_NAME}" || { echo "ERROR: gzip verification failed!"; exit 1; }

          NEW_GZ_SIZE=$(stat -c%s "dist/${SERVER_TAR_NAME}")
          echo "Server tar: ${SERVER_TAR_NAME} (${NEW_GZ_SIZE} bytes)"

          echo "NEW_GZ_SIZE=${NEW_GZ_SIZE}" >> "$GITHUB_ENV"
          echo "SERVER_TAR_NAME=${SERVER_TAR_NAME}" >> "$GITHUB_ENV"

      # 从之前的 Release 下载旧版本 server tar，生成文件级补丁
      - name: Generate file-level patches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          echo "=== Generating file-level patches for ${TAG} (server ${VERSION}) ==="

          TMPDIR=$(mktemp -d)
          trap "rm -rf $TMPDIR" EXIT

          # 查找最近的包含 server tar 的旧版本 tag
          ALL_TAGS=$(git tag --sort=-creatordate | grep -E '^(v|server-v)[0-9]+\.[0-9]+\.[0-9]+$' | grep -v "^${TAG}$" | head -10)

          if [ -z "$ALL_TAGS" ]; then
            echo "No previous tags found, skipping patch generation"
            mkdir -p dist
            echo "[]" > dist/deltas.json
            exit 0
          fi

          echo "Candidate tags: $(echo $ALL_TAGS | tr '\n' ' ')"

          DELTAS_JSON="[]"
          PATCH_COUNT=0
          NEW_SERVER_DIR="dist/vacdevice-server"

          for PREV_TAG in $ALL_TAGS; do
            [ "$PATCH_COUNT" -ge 3 ] && break

            echo ""
            echo "--- Trying ${PREV_TAG} ---"

            # 从 tag 类型决定如何提取实际 server 版本号
            if [[ "$PREV_TAG" == server-v* ]]; then
              OLD_VERSION=$(echo "$PREV_TAG" | sed 's/^server-v//')
            else
              PROBE_DIR=$(mktemp -d)
              if gh release download "$PREV_TAG" --repo "${{ github.repository }}" \
                --pattern "server-*.tar.gz" --dir "$PROBE_DIR" 2>/dev/null; then
                FOUND_TAR=$(ls -1 "$PROBE_DIR"/server-*.tar.gz 2>/dev/null | grep -v 'patch' | head -1)
                if [ -n "$FOUND_TAR" ]; then
                  OLD_VERSION=$(basename "$FOUND_TAR" | sed 's/^server-//' | sed 's/\.tar\.gz$//')
                else
                  echo "WARNING: No server tar in $PREV_TAG, skipping"
                  rm -rf "$PROBE_DIR"
                  continue
                fi
              else
                echo "WARNING: Cannot download from $PREV_TAG, skipping"
                rm -rf "$PROBE_DIR"
                continue
              fi
              rm -rf "$PROBE_DIR"
            fi

            echo "Resolved actual server version: ${OLD_VERSION}"

            OLD_WORKDIR="$TMPDIR/old-${OLD_VERSION}"
            mkdir -p "$OLD_WORKDIR"

            # 下载旧版 server tar
            gh release download "$PREV_TAG" --repo "${{ github.repository }}" \
              --pattern "server-${OLD_VERSION}.tar.gz" --dir "$OLD_WORKDIR" 2>/dev/null || true

            if [ ! -f "$OLD_WORKDIR/server-${OLD_VERSION}.tar.gz" ]; then
              # 回退：从全量 Tauri Release 的 app bundle 中提取
              echo "No standalone server tar for ${PREV_TAG}, trying app bundle..."
              gh release download "$PREV_TAG" --repo "${{ github.repository }}" \
                --pattern "*.app.tar.gz" --dir "$OLD_WORKDIR" 2>/dev/null || true

              OLD_APP_TAR=$(ls "$OLD_WORKDIR"/*.app.tar.gz 2>/dev/null | head -1 || true)
              if [ -n "$OLD_APP_TAR" ]; then
                echo "Extracting server from ${OLD_APP_TAR}..."
                mkdir -p "$OLD_WORKDIR/app"
                tar xzf "$OLD_APP_TAR" -C "$OLD_WORKDIR/app"
                OLD_SERVER=$(find "$OLD_WORKDIR/app" -path "*/Resources/server" -type d | head -1 || true)
                if [ -n "$OLD_SERVER" ]; then
                  # 打包成 server tar 以便统一处理
                  tar czf "$OLD_WORKDIR/server-${OLD_VERSION}.tar.gz" -C "$OLD_SERVER" .
                else
                  echo "Server directory not found in ${PREV_TAG} app bundle, skipping"
                  continue
                fi
              else
                echo "No archive found for ${PREV_TAG}, skipping"
                continue
              fi
            fi

            OLD_TAR="$OLD_WORKDIR/server-${OLD_VERSION}.tar.gz"

            if [ ! -f "$OLD_TAR" ]; then
              echo "Old server tar not found, skipping"
              continue
            fi

            echo "Old server tar found: $OLD_TAR"

            # 解压旧版 server
            OLD_SERVER_DIR=$(mktemp -d)
            tar xzf "$OLD_TAR" -C "$OLD_SERVER_DIR"

            # 生成两边的文件列表和哈希
            PATCH_DIR=$(mktemp -d)

            (cd "$OLD_SERVER_DIR" && find . -type f | sort | while read f; do
              echo "$(sha256sum "$f" | cut -d' ' -f1) $f"
            done) > /tmp/old_hashes.txt

            (cd "$NEW_SERVER_DIR" && find . -type f | sort | while read f; do
              echo "$(sha256sum "$f" | cut -d' ' -f1) $f"
            done) > /tmp/new_hashes.txt

            # 分析差异
            ADDED=""
            MODIFIED=""
            DELETED=""

            # 找出 added 和 modified
            # 注意：使用 grep -F 固定字符串匹配，避免路径中的 [id] 等方括号被当作正则字符类
            while IFS=' ' read -r hash filepath; do
              filepath="${filepath#./}"
              old_hash=$(grep -F " ./${filepath}" /tmp/old_hashes.txt | cut -d' ' -f1 || true)
              if [ -z "$old_hash" ]; then
                ADDED="${ADDED}\"${filepath}\","
                mkdir -p "$PATCH_DIR/$(dirname "$filepath")"
                cp "$NEW_SERVER_DIR/$filepath" "$PATCH_DIR/$filepath"
              elif [ "$hash" != "$old_hash" ]; then
                MODIFIED="${MODIFIED}\"${filepath}\","
                mkdir -p "$PATCH_DIR/$(dirname "$filepath")"
                cp "$NEW_SERVER_DIR/$filepath" "$PATCH_DIR/$filepath"
              fi
            done < /tmp/new_hashes.txt

            # 找出 deleted（在旧版中但不在新版中）
            while IFS=' ' read -r hash filepath; do
              filepath="${filepath#./}"
              if ! grep -qF " ./${filepath}" /tmp/new_hashes.txt; then
                DELETED="${DELETED}\"${filepath}\","
              fi
            done < /tmp/old_hashes.txt

            # 强制将 manifest 文件加入 delta 包（即使 hash 没变）
            FORCE_MANIFESTS=".next/routes-manifest.json .next/build-manifest.json .next/app-build-manifest.json .next/server/middleware-manifest.json .next/server/app-paths-manifest.json .next/prerender-manifest.json"
            for mf in $FORCE_MANIFESTS; do
              if [ -f "$NEW_SERVER_DIR/$mf" ]; then
                # 检查是否已在 MODIFIED 或 ADDED 中
                if ! echo "$MODIFIED$ADDED" | grep -q "\"${mf}\""; then
                  MODIFIED="${MODIFIED}\"${mf}\","
                  mkdir -p "$PATCH_DIR/$(dirname "$mf")"
                  cp "$NEW_SERVER_DIR/$mf" "$PATCH_DIR/$mf"
                fi
              fi
            done

            # 强制将 build-manifest 引用的 static 资源加入 delta（跨平台构建 chunk hash 不同，必须包含）
            echo "[Delta] 强制包含 manifest 引用的 static 资源..."
            STATIC_FORCED=0
            for manifest_file in .next/build-manifest.json .next/app-build-manifest.json; do
              [ -f "$NEW_SERVER_DIR/$manifest_file" ] || continue
              while IFS= read -r sf; do
                full=".next/$sf"
                [ -f "$NEW_SERVER_DIR/$full" ] || continue
                if ! echo "$MODIFIED$ADDED" | grep -qF "\"${full}\""; then
                  MODIFIED="${MODIFIED}\"${full}\","
                fi
                mkdir -p "$PATCH_DIR/$(dirname "$full")"
                cp "$NEW_SERVER_DIR/$full" "$PATCH_DIR/$full"
                STATIC_FORCED=$((STATIC_FORCED + 1))
              done < <(jq -r '.. | strings | select(startswith("static/"))' "$NEW_SERVER_DIR/$manifest_file" | sort -u)
            done
            echo "[Delta] 强制包含 manifest 引用的 static 资源: ${STATIC_FORCED} 个"

            # 去掉尾部逗号，构造 JSON
            ADDED=$(echo "[$ADDED]" | sed 's/,]/]/')
            MODIFIED=$(echo "[$MODIFIED]" | sed 's/,]/]/')
            DELETED=$(echo "[$DELETED]" | sed 's/,]/]/')

            # 写入 manifest
            jq -n \
              --arg from "$OLD_VERSION" \
              --arg to "$VERSION" \
              --argjson modified "$MODIFIED" \
              --argjson added "$ADDED" \
              --argjson deleted "$DELETED" \
              '{from: $from, to: $to, modified: $modified, added: $added, deleted: $deleted}' \
              > "$PATCH_DIR/__manifest.json"

            echo "=== Patch Manifest ==="
            cat "$PATCH_DIR/__manifest.json"

            # 检查是否有实际变化
            TOTAL_CHANGES=$(echo "$ADDED $MODIFIED $DELETED" | tr ',' '\n' | grep -c '"' || true)

            if [ "$TOTAL_CHANGES" -gt 0 ]; then
              PATCH_NAME="server-patch-${OLD_VERSION}-${VERSION}.tar.gz"
              tar czf "dist/${PATCH_NAME}" -C "$PATCH_DIR" .

              PATCH_SIZE=$(stat -c%s "dist/${PATCH_NAME}" 2>/dev/null || stat -f%z "dist/${PATCH_NAME}")

              # 补丁大小异常检测：超过全量 tar.gz 的 80% 则跳过
              THRESHOLD=$(( ${NEW_GZ_SIZE} * 80 / 100 ))
              if [ "$PATCH_SIZE" -gt "$THRESHOLD" ]; then
                echo "Patch ${PATCH_NAME} (${PATCH_SIZE} bytes) exceeds 80% of full tar (${NEW_GZ_SIZE} bytes), skipping"
                rm -f "dist/${PATCH_NAME}"
                rm -rf "$OLD_SERVER_DIR" "$PATCH_DIR"
                continue
              fi

              PATCH_HASH=$(sha256sum "dist/${PATCH_NAME}" | cut -d' ' -f1)
              echo "Patch: ${PATCH_NAME}, size: ${PATCH_SIZE}, hash: ${PATCH_HASH}"

              # 累积到 JSON 数组（patchName 稍后在上传阶段替换为完整 URL）
              DELTAS_JSON=$(echo "$DELTAS_JSON" | jq \
                --arg from "$OLD_VERSION" \
                --arg patchName "${PATCH_NAME}" \
                --argjson size "$PATCH_SIZE" \
                --arg hash "sha256:${PATCH_HASH}" \
                '[.[] | select(.from != $from)] + [{ from: $from, patchName: $patchName, size: $size, hash: $hash }]')

              PATCH_COUNT=$((PATCH_COUNT + 1))
            else
              echo "No changes detected between ${OLD_VERSION} and ${VERSION}, skipping"
            fi

            # 清理
            rm -rf "$OLD_SERVER_DIR" "$PATCH_DIR"
          done

          echo ""
          echo "--- Generated ${PATCH_COUNT} valid patch(es) ---"

          echo "$DELTAS_JSON" > dist/deltas.json
          echo "patch_count=${PATCH_COUNT}" >> "$GITHUB_ENV"

      # 找到最近的 v* 全量 Release，server 资产将上传到该 Release 下
      - name: Find latest app release
        id: app_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          echo "=== Finding latest v* app release ==="

          LATEST_APP_TAG=$(gh release list --repo "${{ github.repository }}" --limit 50 --json tagName \
            --jq '[.[] | select(.tagName | startswith("v")) | select(.tagName | startswith("server-v") | not)][0].tagName')

          if [ -z "$LATEST_APP_TAG" ] || [ "$LATEST_APP_TAG" = "null" ]; then
            echo "ERROR: No v* app release found. You must publish a full app release (v*) before releasing server-only updates."
            exit 1
          fi

          echo "Found latest app release: ${LATEST_APP_TAG}"
          echo "app_tag=${LATEST_APP_TAG}" >> "$GITHUB_OUTPUT"

      # 生成 latest.json（保留现有 Tauri 更新信息，更新 server 相关字段）
      - name: Generate latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          VERSION="${{ steps.version.outputs.version }}"
          LATEST_APP_TAG="${{ steps.app_release.outputs.app_tag }}"

          # 先将 deltas.json 中的 patchName 转换为完整 URL（指向 v* Release）
          GH_BASE="https://github.com/${{ github.repository }}/releases/download/${LATEST_APP_TAG}"
          DELTAS_JSON=$(cat dist/deltas.json | jq --arg base "$GH_BASE" '
            [ .[] | .url = "\($base)/\(.patchName)" | del(.patchName) ]
          ')

          # 计算 server 全量包的 hash 和 size，用于 serverFullUrl
          SERVER_TAR_PATH="dist/${SERVER_TAR_NAME}"
          SERVER_FULL_SIZE=$(stat -c%s "$SERVER_TAR_PATH" 2>/dev/null || stat -f%z "$SERVER_TAR_PATH")
          SERVER_FULL_HASH=$(sha256sum "$SERVER_TAR_PATH" | cut -d' ' -f1)
          SERVER_FULL_GH_URL="${GH_BASE}/${SERVER_TAR_NAME}"
          SERVER_FULL_CDN_URL="http://${{ secrets.QINIU_CDN_DOMAIN }}/ssts/releases/${VERSION}/${SERVER_TAR_NAME}"
          echo "Server full tar: size=${SERVER_FULL_SIZE}, hash=${SERVER_FULL_HASH}"

          # 生成更新说明（commit log）写入 latest.json 的 notes 字段
          PREV_TAG=$(git tag --sort=-creatordate | grep -E '^(v|server-v)[0-9]+\.[0-9]+\.[0-9]+$' | grep -v "^${TAG}$" | head -1)
          echo "PREV_TAG=${PREV_TAG}, TAG=${TAG}, HEAD=$(git rev-parse --short HEAD)"
          if [ -n "$PREV_TAG" ]; then
            echo "Generating notes from ${PREV_TAG}..HEAD"
            NOTES=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --no-merges 2>/dev/null | head -20 || true)
          fi
          if [ -z "$NOTES" ]; then
            echo "No commits between tags, using current commit message"
            NOTES=$(git log -1 --pretty=format:"- %s" 2>/dev/null || true)
          fi
          [ -z "$NOTES" ] && NOTES="版本更新"
          echo "NOTES: $NOTES"

          # 下载现有 Release 的 latest.json 以保留 platforms 等 Tauri 更新信息
          mkdir -p dist/existing
          gh release download "$LATEST_APP_TAG" --repo "${{ github.repository }}" \
            --pattern "latest.json" --dir dist/existing --clobber 2>/dev/null || true

          if [ -f "dist/existing/latest.json" ]; then
            echo "Found existing latest.json from ${LATEST_APP_TAG}"
            # 在现有 latest.json 基础上更新 server 相关字段
            jq --arg sv "$VERSION" \
               --argjson deltas "$DELTAS_JSON" \
               --arg sfu_url "$SERVER_FULL_GH_URL" \
               --arg sfu_cdn "$SERVER_FULL_CDN_URL" \
               --argjson sfu_size "$SERVER_FULL_SIZE" \
               --arg sfu_hash "sha256:${SERVER_FULL_HASH}" \
               --arg notes "$NOTES" \
               '
               .serverVersion = $sv |
               .notes = $notes |
               .serverFullUrl = {
                 url: $sfu_url,
                 cdnUrl: $sfu_cdn,
                 size: $sfu_size,
                 hash: $sfu_hash
               } |
               .serverDeltas = {
                 "darwin-aarch64": $deltas,
                 "darwin-x86_64": $deltas,
                 "windows-x86_64": $deltas,
                 "linux-x86_64": $deltas
               }
               ' dist/existing/latest.json > dist/latest.json
          else
            # 没有现有 latest.json，创建一个仅包含 server 信息的新文件
            echo "No existing latest.json found in ${LATEST_APP_TAG}, creating new one"
            jq -n \
               --arg sv "$VERSION" \
               --argjson deltas "$DELTAS_JSON" \
               --arg sfu_url "$SERVER_FULL_GH_URL" \
               --arg sfu_cdn "$SERVER_FULL_CDN_URL" \
               --argjson sfu_size "$SERVER_FULL_SIZE" \
               --arg sfu_hash "sha256:${SERVER_FULL_HASH}" \
               --arg notes "$NOTES" \
               '{
                 serverVersion: $sv,
                 notes: $notes,
                 serverFullUrl: {
                   url: $sfu_url,
                   cdnUrl: $sfu_cdn,
                   size: $sfu_size,
                   hash: $sfu_hash
                 },
                 serverDeltas: {
                   "darwin-aarch64": $deltas,
                   "darwin-x86_64": $deltas,
                   "windows-x86_64": $deltas,
                   "linux-x86_64": $deltas
                 }
               }' > dist/latest.json
          fi

          echo "=== latest.json content ==="
          cat dist/latest.json | jq .
          echo "=========================="

      # 上传所有资产到最近的 v* Release（不创建独立 Release）
      - name: Upload assets to app release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          LATEST_APP_TAG="${{ steps.app_release.outputs.app_tag }}"

          echo "=== Uploading server assets to ${LATEST_APP_TAG} release ==="

          # 上传并回验函数：上传后从 GitHub 重新下载校验完整性
          upload_and_verify() {
            local file="$1"
            local tag="$2"
            local max_retries=3
            local attempt=1
            local basename=$(basename "$file")

            while [ $attempt -le $max_retries ]; do
              echo "Upload attempt $attempt/$max_retries: $basename"
              gh release upload "$tag" "$file" --repo "${{ github.repository }}" --clobber

              # 回验：从 GitHub 重新下载并校验
              local verify_dir=$(mktemp -d)
              gh release download "$tag" --repo "${{ github.repository }}" --pattern "$basename" --dir "$verify_dir"

              if [[ "$basename" == *.tar.gz ]]; then
                if gzip -t "$verify_dir/$basename" 2>/dev/null; then
                  echo "✓ Upload verified: $basename"
                  rm -rf "$verify_dir"
                  return 0
                else
                  echo "✗ Upload corrupted on attempt $attempt: $basename"
                fi
              elif [[ "$basename" == *.json ]]; then
                if jq empty "$verify_dir/$basename" 2>/dev/null; then
                  echo "✓ Upload verified: $basename"
                  rm -rf "$verify_dir"
                  return 0
                else
                  echo "✗ Upload corrupted on attempt $attempt: $basename"
                fi
              else
                echo "✓ Upload completed (no format check): $basename"
                rm -rf "$verify_dir"
                return 0
              fi

              rm -rf "$verify_dir"
              attempt=$((attempt + 1))
              sleep 5
            done

            echo "ERROR: Upload failed after $max_retries attempts: $basename"
            return 1
          }

          # 上传前完整性校验
          echo "--- Verifying file integrity before upload ---"
          gzip -t "dist/${SERVER_TAR_NAME}" || { echo "ERROR: ${SERVER_TAR_NAME} integrity check failed!"; exit 1; }
          echo "✓ ${SERVER_TAR_NAME} integrity verified"

          for patch in dist/server-patch-*.tar.gz; do
            [ -f "$patch" ] || continue
            gzip -t "$patch" || { echo "ERROR: $(basename $patch) integrity check failed!"; exit 1; }
            echo "✓ $(basename $patch) integrity verified"
          done

          # 上传 server tar
          echo "--- Uploading server tar ---"
          upload_and_verify "dist/${SERVER_TAR_NAME}" "$LATEST_APP_TAG"

          # 上传 patch 文件
          echo "--- Uploading patch files ---"
          for patch in dist/server-patch-*.tar.gz; do
            [ -f "$patch" ] || continue
            echo "  Uploading: $(basename $patch)"
            upload_and_verify "$patch" "$LATEST_APP_TAG"
          done

          # 上传 latest.json（覆盖旧的）
          echo "--- Uploading latest.json ---"
          upload_and_verify dist/latest.json "$LATEST_APP_TAG"

          echo "=== Upload to ${LATEST_APP_TAG} complete ==="

      # 上传完成后，更新 Release Notes 追加热更新变更说明
      - name: Update release notes with server changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          RELEASE_TAG="${{ steps.app_release.outputs.app_tag }}"

          # 生成热更新变更说明
          PREV_TAG=$(git tag --sort=-creatordate | grep -E '^server-v[0-9]+' | grep -v "^${TAG}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            SERVER_NOTES=$(git log ${PREV_TAG}..${TAG} --pretty=format:"- %s" --no-merges || true)
          else
            SERVER_NOTES="- 热更新首次发布"
          fi
          [ -z "$SERVER_NOTES" ] && SERVER_NOTES="- 热更新版本更新"

          echo "Server notes:"
          echo "$SERVER_NOTES"

          # 获取当前 Release Notes 并追加
          CURRENT_NOTES=$(gh release view "$RELEASE_TAG" --json body -q '.body' || echo "")

          UPDATED_NOTES="${CURRENT_NOTES}"$'\n\n'
          UPDATED_NOTES+="### Server 热更新 ${VERSION}"$'\n'
          UPDATED_NOTES+="${SERVER_NOTES}"

          gh release edit "$RELEASE_TAG" --notes "$UPDATED_NOTES"

          echo "Release notes updated for ${RELEASE_TAG}"

  # Job 2: 同步到七牛云 CDN（国内加速）
  sync-qiniu:
    needs: build-and-delta
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#server-v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Server version: ${VERSION}"

      - name: Find latest app release
        id: app_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          LATEST_APP_TAG=$(gh release list --repo "${{ github.repository }}" --limit 50 --json tagName \
            --jq '[.[] | select(.tagName | startswith("v")) | select(.tagName | startswith("server-v") | not)][0].tagName')

          if [ -z "$LATEST_APP_TAG" ] || [ "$LATEST_APP_TAG" = "null" ]; then
            echo "ERROR: No v* app release found"
            exit 1
          fi

          echo "Found latest app release: ${LATEST_APP_TAG}"
          echo "app_tag=${LATEST_APP_TAG}" >> "$GITHUB_OUTPUT"

      - name: Download assets from GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          LATEST_APP_TAG="${{ steps.app_release.outputs.app_tag }}"
          mkdir -p dist/qiniu
          cd dist/qiniu

          echo "--- Downloading server assets from ${LATEST_APP_TAG} ---"
          gh release download "$LATEST_APP_TAG" --repo "${{ github.repository }}" \
            --pattern "server-*.tar.gz" --clobber 2>/dev/null || true
          gh release download "$LATEST_APP_TAG" --repo "${{ github.repository }}" \
            --pattern "latest.json" --clobber 2>/dev/null || true

          echo "Downloaded files:"
          ls -lh

      - name: Install qshell
        run: |
          set -e
          wget -q https://github.com/qiniu/qshell/releases/download/v2.19.4/qshell-v2.19.4-linux-amd64.tar.gz -O /tmp/qshell.tar.gz
          tar xzf /tmp/qshell.tar.gz -C /tmp
          sudo mv /tmp/qshell /usr/local/bin/qshell
          chmod +x /usr/local/bin/qshell
          qshell version

      - name: Configure qshell
        run: |
          qshell account ${{ secrets.QINIU_ACCESS_KEY }} ${{ secrets.QINIU_SECRET_KEY }} ssts-ci

      - name: Rewrite latest.json URLs for Qiniu
        run: |
          set -e
          VERSION="${{ steps.version.outputs.version }}"
          LATEST_APP_TAG="${{ steps.app_release.outputs.app_tag }}"
          GH_BASE="https://github.com/${{ github.repository }}/releases/download/${LATEST_APP_TAG}"
          CDN_BASE="http://o09u11p5v.qnssl.com/ssts/releases/${VERSION}"

          if [ -f "dist/qiniu/latest.json" ]; then
            jq --arg gb "$GH_BASE" --arg cdn "$CDN_BASE" '
              walk(
                if type == "object" and has("url") then
                  .url = (.url | sub($gb; $cdn))
                else .
                end
              )
            ' dist/qiniu/latest.json > dist/qiniu/latest-qiniu.json
            mv dist/qiniu/latest-qiniu.json dist/qiniu/latest.json
            echo "=== Rewritten latest.json ==="
            cat dist/qiniu/latest.json | jq .
          else
            echo "WARNING: latest.json not found, skipping URL rewrite"
          fi

      - name: Upload files to Qiniu
        env:
          QINIU_BUCKET: ${{ secrets.QINIU_BUCKET }}
        run: |
          set -e
          VERSION="${{ steps.version.outputs.version }}"
          SUCCESS=0
          FAIL=0

          upload_to_qiniu() {
            local file="$1"
            local key="$2"
            echo "  Uploading: ${file} -> ${key}"
            if qshell fput "$QINIU_BUCKET" "$key" "$file" --overwrite; then
              echo "    OK: ${key}"
              return 0
            else
              echo "    FAIL: ${key}"
              return 1
            fi
          }

          # Upload server tar and patch tar files
          for file in dist/qiniu/server-*.tar.gz; do
            [ -f "$file" ] || continue
            FNAME=$(basename "$file")
            if upload_to_qiniu "$file" "ssts/releases/${VERSION}/${FNAME}"; then
              SUCCESS=$((SUCCESS + 1))
            else
              FAIL=$((FAIL + 1))
            fi
          done

          # Upload latest.json to versioned path
          if [ -f "dist/qiniu/latest.json" ]; then
            if upload_to_qiniu "dist/qiniu/latest.json" "ssts/releases/${VERSION}/latest.json"; then
              SUCCESS=$((SUCCESS + 1))
            else
              FAIL=$((FAIL + 1))
            fi

            # Upload latest.json to fixed path for update checking
            if upload_to_qiniu "dist/qiniu/latest.json" "ssts/latest.json"; then
              SUCCESS=$((SUCCESS + 1))
            else
              FAIL=$((FAIL + 1))
            fi
          fi

          echo ""
          echo "=== Qiniu upload complete: ${SUCCESS} OK, ${FAIL} FAIL ==="
          if [ "$FAIL" -gt 0 ]; then
            echo "WARNING: Some uploads failed, but continuing (Qiniu is acceleration channel)"
          fi

      - name: Refresh Qiniu CDN cache
        if: success()
        run: |
          echo "=== Refreshing CDN cache for latest.json ==="
          echo "http://o09u11p5v.qnssl.com/ssts/latest.json" > /tmp/cdn_refresh_urls.txt
          qshell cdnrefresh --urls -i /tmp/cdn_refresh_urls.txt || echo "WARNING: CDN refresh failed, cache will expire naturally"
          echo "CDN cache refresh requested"
